<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timely</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
      }
    </style>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("timely-startup-prefs");
          var parsed = raw ? JSON.parse(raw) : null;
          var themeMode = parsed && typeof parsed.themeMode === "string" ? parsed.themeMode : "system";
          var theme =
            themeMode === "light" || themeMode === "dark"
              ? themeMode
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          var frame = theme === "dark" ? "oklch(0.105 0.012 55)" : "oklch(0.894 0.014 68)";
          var root = document.documentElement;

          root.setAttribute("data-theme", theme);
          root.style.colorScheme = theme;
          root.style.backgroundColor = frame;
          if (document.body) {
            document.body.style.backgroundColor = frame;
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/entry/app-entry.tsx"></script>
  </body>
</html>
