name: CI and Release Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  quality:
    name: Lint and Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Lint TypeScript
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Lint Rust
        run: npm run lint:rs

  validate-release:
    name: Validate release channel
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate GitHub release type matches version suffix
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Version: $VERSION"
          if [[ "$VERSION" == *-* ]]; then
            if [[ "${{ github.event.release.prerelease }}" != "true" ]]; then
              echo "Prerelease version '$VERSION' must be published as a GitHub prerelease."
              exit 1
            fi
          else
            if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
              echo "Stable version '$VERSION' cannot be published as a GitHub prerelease."
              exit 1
            fi
          fi

  build-release:
    name: Build installers (${{ matrix.os }})
    if: github.event_name == 'release'
    needs: [quality, validate-release]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-24.04, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release frontend metadata
        run: npm run build:release

      - name: Build and upload installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_APP_VERSION: ${{ github.event.release.tag_name }}
          VITE_FEATURE_PLAY: ${{ github.event.release.prerelease && 'true' || 'false' }}
          VITE_FEATURE_ONBOARDING_TOUR: ${{ github.event.release.prerelease && 'true' || 'false' }}
        with:
          releaseId: ${{ github.event.release.id }}
          includeDebug: false
          includeUpdaterJson: false
