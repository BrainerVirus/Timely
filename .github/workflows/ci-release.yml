name: CI and Release Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  quality:
    name: Quality / ${{ matrix.check.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        check:
          - name: Frontend lint
            command: npm run lint
          - name: Frontend test
            command: npm run test
          - name: Rust lint
            command: npm run lint:rs
          - name: Rust test
            command: npm run test:rs

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run ${{ matrix.check.name }}
        run: ${{ matrix.check.command }}

  validate-release:
    name: Validate release channel
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate GitHub release type matches version suffix
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Version: $VERSION"
          if [[ "$VERSION" == *-* ]]; then
            if [[ "${{ github.event.release.prerelease }}" != "true" ]]; then
              echo "Prerelease version '$VERSION' must be published as a GitHub prerelease."
              exit 1
            fi
          else
            if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
              echo "Stable version '$VERSION' cannot be published as a GitHub prerelease."
              exit 1
            fi
          fi

  build-release:
    name: Build installers (${{ matrix.os }})
    if: github.event_name == 'release'
    needs: [quality, validate-release]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-24.04, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release frontend metadata
        env:
          VITE_LOG_LEVEL: "off"
        run: npm run build:release

      - name: Build and upload installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_APP_VERSION: ${{ github.event.release.tag_name }}
          VITE_FEATURE_PLAY: "false"
          VITE_FEATURE_ONBOARDING_TOUR: "true"
          VITE_LOG_LEVEL: "off"
          TIMELY_LOG_LEVEL: "off"
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos-latest' && github.event.release.prerelease && '-' || '' }}
          # Headless macOS runners: default DMG path runs AppleScript against Finder and often
          # times out (-1712) or hangs on newer runner images. "false" = use CI-safe DMG layout.
          # https://github.com/tauri-apps/tauri-action/issues/1003
          # https://github.com/tauri-apps/tauri-action/issues/1091
          TAURI_BUNDLER_DMG_IGNORE_CI: "false"
        with:
          releaseId: ${{ github.event.release.id }}
          tagName: ${{ github.event.release.tag_name }}
          includeDebug: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.os == 'windows-latest' && github.event.release.prerelease && '--bundles nsis' || '' }}

      - name: Publish channel updater manifest
        if: matrix.os == 'ubuntu-24.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RELEASE_ID: ${{ github.event.release.id }}
          UPDATER_CHANNEL: ${{ github.event.release.prerelease && 'unstable' || 'stable' }}
        run: node scripts/publish-updater-manifest.cjs
